# Populates the kanban board (https://github.com/users/mazijoni/projects/3) with
# one GitHub Issue per planned feature from the README, then adds each issue to
# the project so the board is ready to use.
#
# Prerequisites — add a repository secret called PROJECTS_TOKEN containing a
# Personal Access Token with the following scopes:
#   • repo   (create issues, read repository)
#   • project (add items to Projects v2 boards)
#
# Trigger once via: Actions → "Setup Kanban Board" → Run workflow

name: Setup Kanban Board

on:
  workflow_dispatch:

permissions: {}

jobs:
  fill-kanban:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
      REPO: mazijoni/multiplayer-game
      OWNER: mazijoni
      PROJECT_NUMBER: 3

    steps:
      - name: Create labels
        run: |
          create_label() {
            gh label create "$1" --color "$2" --description "$3" \
              --repo "$REPO" 2>/dev/null || true
          }
          create_label "gameplay"  "0075ca" "Core gameplay mechanics"
          create_label "physics"   "e4e669" "Physics simulation"
          create_label "npc"       "d93f0b" "NPC behaviour and AI"
          create_label "maps"      "0052cc" "Level design and maps"
          create_label "ui"        "bfd4f2" "User interface"
          create_label "backend"   "5319e7" "Server and database"
          create_label "art"       "fef2c0" "Visual style and assets"

      - name: Create issues and add to project
        run: |
          add() {
            local title="$1"
            local body="$2"
            local labels="$3"

            local url
            url=$(gh issue create \
              --repo    "$REPO" \
              --title   "$title" \
              --body    "$body" \
              --label   "$labels")

            echo "Created: $url"
            gh project item-add "$PROJECT_NUMBER" --owner "$OWNER" --url "$url"
            echo "Added to project #$PROJECT_NUMBER"
          }

          add \
            "Ragdoll body physics" \
            "Implement floppy, heavy ragdoll body physics. The body must react realistically to gravity and collisions — limbs caught in doorways, sliding down stairs, and resisting every attempt to move it tidily." \
            "physics,gameplay"

          add \
            "Cooperative grab/drag/carry mechanics" \
            "Allow multiple players to grab, drag, and carry the body together. Heavier lifts should require more players. Implement grab, carry, and drop interactions that feel clumsy and chaotic." \
            "gameplay"

          add \
            "NPC patrol routines" \
            "Implement NPC characters that follow patrol routes simulating daily routines around each map. NPCs should react when their path is blocked or when something looks out of place." \
            "npc,gameplay"

          add \
            "NPC suspicion trigger system" \
            "Implement the suspicion system that drives NPC reactions:

| Trigger | Suspicion Level |
|---|---|
| Visible body / body part | High |
| Player running while carrying | Medium |
| Loud noise nearby | Medium |
| Door left open | Low |
| Player staring at hiding spot | Low |

When suspicion fills the NPC will investigate. If they find the body, the round ends." \
            "npc,gameplay"

          add \
            "Multiple maps" \
            "Design and implement at least five maps: apartment, office, hotel, school, house party. Each map should have a unique layout, hiding spots, and NPC patrol routes suited to its setting." \
            "maps"

          add \
            "Hiding spots" \
            "Implement interactive hiding spots across all maps: closets, dumpsters, lockers, containers, storage rooms. The body must fit entirely inside and be hidden from NPC line of sight." \
            "gameplay,maps"

          add \
            "Round timer with escalating tension" \
            "Add a countdown timer to each round. As time runs out tension escalates — more NPCs enter the map, investigators close in, and the situation becomes harder to control." \
            "gameplay"

          add \
            "Random events each round" \
            "Introduce randomisation per round to keep gameplay fresh: different body and player spawn locations, randomised NPC schedules, and unexpected mid-round incidents (e.g. a witness appears, a door blows open)." \
            "gameplay"

          add \
            "Persistent player stats in MariaDB" \
            "Integrate MariaDB on the Raspberry Pi server. After each round write win/loss results and round count per player using the planned schema:

\`\`\`sql
CREATE TABLE players (
    id            INT AUTO_INCREMENT PRIMARY KEY,
    display_name  VARCHAR(64) NOT NULL UNIQUE,
    created_at    DATETIME DEFAULT CURRENT_TIMESTAMP
);

CREATE TABLE rounds (
    id          INT AUTO_INCREMENT PRIMARY KEY,
    played_at   DATETIME DEFAULT CURRENT_TIMESTAMP,
    winner_id   INT REFERENCES players(id)
);

CREATE TABLE stats (
    player_id     INT PRIMARY KEY REFERENCES players(id),
    rounds_played INT DEFAULT 0,
    wins          INT DEFAULT 0
);
\`\`\`" \
            "backend"

          add \
            "Leaderboard screen" \
            "Design and implement a leaderboard screen accessible from the lobby. Fetch persistent stats (wins, rounds played) from the MariaDB database and display them in a ranked table." \
            "ui,backend"

          add \
            "Stylized/cartoon visual style" \
            "Apply a cohesive stylized or cartoon visual style across all game elements — player characters, the body, maps, NPCs, and UI. Define and document an art style guide to keep contributions consistent." \
            "art"
